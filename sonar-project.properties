# =====================================================
# SonarQube Project Configuration - ConnectHub Frontend (Angular)
# =====================================================

sonar.projectKey=connecthub-frontend
sonar.projectName=ConnectHub Frontend
sonar.projectVersion=0.0.0

# Source directory - only scan the actual app source
sonar.sources=src

# Test directory
sonar.tests=src

# Include only TypeScript files from app source
sonar.inclusions=src/app/**/*.ts,src/app/**/*.html,src/app/**/*.scss

# Exclude node_modules, dist, build artifacts, env files, and auto-generated files
sonar.exclusions=\
  node_modules/**, \
  dist/**, \
  .angular/**, \
  coverage/**, \
  **/*.spec.ts, \
  **/environments/**, \
  src/main.ts, \
  **/*.old.ts

# Test file patterns
sonar.test.inclusions=**/*.spec.ts

sonar.sourceEncoding=UTF-8
sonar.host.url=http://localhost:9000

# TypeScript settings
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.tsconfigPath=tsconfig.json
